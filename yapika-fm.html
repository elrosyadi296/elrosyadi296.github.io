<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAPIKA FM 107.8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #1db954;
            --bg-dark: #090909;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent: #282828;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Mencegah scroll saat splash screen aktif */
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-logo {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px var(--primary); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .loader-text {
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            font-size: 1.2rem;
        }

        .loading-bar-container {
            width: 200px;
            height: 3px;
            background: var(--accent);
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            animation: loadingFill 2.5s forwards;
        }

        @keyframes loadingFill {
            to { width: 100%; }
        }

        /* Main App Container */
        .app-content {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .app-content.show {
            opacity: 1;
            transform: translateY(0);
        }

        .player-container {
            background: var(--card-bg);
            border-radius: 35px;
            padding: clamp(20px, 5vw, 30px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            border: 1px solid var(--accent);
            position: relative;
            width: 100%;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand i { color: var(--primary); font-size: 22px; }
        .brand h2 { font-size: 1rem; font-weight: 700; letter-spacing: 1px; }

        /* Vinyl Animation */
        .vinyl-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .vinyl-container {
            width: clamp(180px, 50vw, 240px);
            height: clamp(180px, 50vw, 240px);
            position: relative;
            background: #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
            border: 10px solid #1a1a1a;
        }

        .vinyl-container::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent, transparent 3px, rgba(255,255,255,0.02) 4px);
        }

        .vinyl-art {
            width: 35%;
            height: 35%;
            background: var(--primary);
            border-radius: 50%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #000;
        }

        .vinyl-art i { font-size: clamp(24px, 8vw, 40px); color: #000; }

        .vinyl-container.playing {
            animation: rotate 5s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Song Info */
        .info {
            text-align: center;
            margin-bottom: 25px;
        }

        .info h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text-main); }
        .info p { color: var(--text-muted); font-size: 0.9rem; }

        /* Progress Bar */
        .progress-box { margin-bottom: 30px; }

        .bar-container {
            width: 100%;
            height: 6px;
            background: var(--accent);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.4);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(10px, 4vw, 25px);
            margin-bottom: 30px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active { transform: scale(0.9); }

        .btn-play {
            width: 75px;
            height: 75px;
            background: var(--primary);
            color: #000;
            font-size: 28px;
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.3);
        }

        .btn-play:hover { background: #1ed760; box-shadow: 0 10px 25px rgba(29, 185, 84, 0.5); }

        /* Volume Control */
        .footer-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass);
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .vol-slider {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: var(--accent);
            border-radius: 10px;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Playlist */
        .playlist-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .playlist-item:hover { background: rgba(255,255,255,0.05); }
        .playlist-item.active { color: var(--primary); background: rgba(29, 185, 84, 0.1); }

        /* Mixer Modal */
        .mixer-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0;
            background: #1a1a1a;
            z-index: 100;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        .mixer-modal.open { height: 80%; }

        /* Responsive Fixes */
        @media (max-width: 480px) {
            body { align-items: flex-end; padding: 0; }
            .app-content { padding: 0; }
            .player-container { 
                border-radius: 35px 35px 0 0; 
                min-height: 90vh;
                border: none;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <i class="fas fa-tower-broadcast loader-logo"></i>
        <div class="loader-text">YAPIKA FM 107.8</div>
        <div class="loading-bar-container">
            <div class="loading-bar-fill"></div>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted);">Menyiapkan Audio...</p>
    </div>

    <!-- App Content -->
    <div class="app-content" id="app">
        <div class="player-container">
            <!-- Header -->
            <div class="header">
                <div class="brand">
                    <i class="fas fa-compact-disc"></i>
                    <h2>YAPIKA FM 107.8</h2>
                </div>
                <button class="btn" onclick="toggleMixer()" title="Mixer Audio">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>

            <!-- Vinyl Animation -->
            <div class="vinyl-wrapper">
                <div class="vinyl-container" id="vinyl">
                    <div class="vinyl-art">
                        <i class="fas fa-music"></i>
                    </div>
                </div>
            </div>

            <!-- Info -->
            <div class="info">
                <h3 id="trackTitle">MUSIC PLAYER</h3>
                <p id="trackStatus">Silahkan tambah lagu Anda</p>
            </div>

            <!-- Progress -->
            <div class="progress-box">
                <div class="bar-container" id="progressArea">
                    <div class="bar-fill" id="progressBar"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn" onclick="toggleRepeat()" id="repeatBtn">
                    <i class="fas fa-redo"></i>
                </button>
                <button class="btn" onclick="prevSong()">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="btn btn-play" onclick="togglePlay()">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="btn" onclick="nextSong()">
                    <i class="fas fa-step-forward"></i>
                </button>
                <button class="btn" onclick="stopSong()">
                    <i class="fas fa-stop"></i>
                </button>
            </div>

            <!-- Volume -->
            <div class="footer-controls">
                <i class="fas fa-volume-off" style="width: 15px;"></i>
                <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
                <i class="fas fa-volume-up" style="width: 15px;"></i>
            </div>

            <!-- Playlist -->
            <div class="playlist-card" id="playlist">
                <!-- Items appear here -->
                <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 20px;">Belum ada lagu di daftar putar.</p>
            </div>

            <button class="btn-add" style="background: var(--primary); color: #000; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="document.getElementById('songFile').click()">
                <i class="fas fa-plus-circle"></i> TAMBAH MUSIK
            </button>
            <input type="file" id="songFile" style="display: none;" accept="audio/*" multiple onchange="addSongs(this.files)">

            <!-- Mixer Modal -->
            <div class="mixer-modal" id="mixer">
                <div style="padding: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h3>Audio Settings</h3>
                        <button class="btn" onclick="toggleMixer()"><i class="fas fa-times"></i></button>
                    </div>
                    
                    <div style="margin-bottom: 40px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>Playback Speed</span>
                            <span id="speedValue">1.0x</span>
                        </div>
                        <input type="range" class="vol-slider" min="0.5" max="2" step="0.1" value="1" oninput="setSpeed(this.value)">
                    </div>

                    <div style="display: flex; justify-content: space-around; text-align: center;">
                        <div>
                            <div style="height: 120px; width: 10px; background: var(--accent); border-radius: 10px; margin: 0 auto 10px; position: relative;">
                                <div style="position: absolute; bottom: 0; width: 100%; height: 50%; background: var(--primary); border-radius: 10px;"></div>
                            </div>
                            <span style="font-size: 12px; color: var(--text-muted);">BASS</span>
                        </div>
                        <div>
                            <div style="height: 120px; width: 10px; background: var(--accent); border-radius: 10px; margin: 0 auto 10px; position: relative;">
                                <div style="position: absolute; bottom: 0; width: 100%; height: 70%; background: var(--primary); border-radius: 10px;"></div>
                            </div>
                            <span style="font-size: 12px; color: var(--text-muted);">MID</span>
                        </div>
                        <div>
                            <div style="height: 120px; width: 10px; background: var(--accent); border-radius: 10px; margin: 0 auto 10px; position: relative;">
                                <div style="position: absolute; bottom: 0; width: 100%; height: 40%; background: var(--primary); border-radius: 10px;"></div>
                            </div>
                            <span style="font-size: 12px; color: var(--text-muted);">TREBLE</span>
                        </div>
                    </div>
                    <p style="margin-top: 30px; font-size: 0.8rem; color: var(--text-muted); text-align: center;">Equalizer adalah simulasi visual pada versi ini.</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        // Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('app');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                app.classList.add('show');
                document.body.style.overflow = 'auto';
            }, 2500); // Tampil selama 2.5 detik
        });

        let playlist = [];
        let currentIndex = -1;
        let isRepeat = false;

        const audio = document.getElementById("audioMain");
        const trackTitle = document.getElementById("trackTitle");
        const trackStatus = document.getElementById("trackStatus");
        const vinyl = document.getElementById("vinyl");
        const playIcon = document.getElementById("playIcon");
        const progressBar = document.getElementById("progressBar");
        const progressArea = document.getElementById("progressArea");
        const playlistElement = document.getElementById("playlist");
        const mixer = document.getElementById("mixer");

        function addSongs(files) {
            if (files.length > 0 && playlist.length === 0) {
                playlistElement.innerHTML = "";
            }
            
            for (let i = 0; i < files.length; i++) {
                playlist.push({
                    name: files[i].name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(files[i])
                });
            }
            renderPlaylist();
            if (currentIndex === -1 && playlist.length > 0) {
                currentIndex = 0;
                loadSong(0);
            }
        }

        function renderPlaylist() {
            if (playlist.length === 0) {
                playlistElement.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 20px;">Belum ada lagu di daftar putar.</p>`;
                return;
            }

            playlistElement.innerHTML = "";
            playlist.forEach((song, index) => {
                const item = document.createElement("div");
                item.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;">${song.name}</span>
                    <i class="fas fa-trash-alt" style="font-size: 12px; color: #ff4444;" onclick="removeSong(event, ${index})"></i>
                `;
                item.onclick = () => playSong(index);
                playlistElement.appendChild(item);
            });
        }

        function loadSong(index) {
            currentIndex = index;
            audio.src = playlist[currentIndex].url;
            trackTitle.textContent = playlist[currentIndex].name;
            trackStatus.textContent = "Siap diputar";
            renderPlaylist();
        }

        function playSong(index) {
            loadSong(index);
            togglePlay();
        }

        function togglePlay() {
            if (currentIndex === -1) return;
            if (audio.paused) {
                audio.play();
                playIcon.className = "fas fa-pause";
                vinyl.classList.add("playing");
                trackStatus.textContent = "Sedang diputar";
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                vinyl.classList.remove("playing");
                trackStatus.textContent = "Dijeda";
            }
        }

        function stopSong() {
            audio.pause();
            audio.currentTime = 0;
            playIcon.className = "fas fa-play";
            vinyl.classList.remove("playing");
            trackStatus.textContent = "Berhenti";
        }

        function nextSong() {
            if (playlist.length === 0) return;
            let next = isRepeat ? currentIndex : (currentIndex + 1) % playlist.length;
            playSong(next);
        }

        function prevSong() {
            if (playlist.length === 0) return;
            let prev = (currentIndex - 1 + playlist.length) % playlist.length;
            playSong(prev);
        }

        function removeSong(e, index) {
            e.stopPropagation();
            playlist.splice(index, 1);
            if (index === currentIndex) {
                stopSong();
                currentIndex = playlist.length > 0 ? 0 : -1;
                if (currentIndex === -1) {
                    trackTitle.textContent = "Media Player";
                    trackStatus.textContent = "Daftar putar kosong";
                } else {
                    loadSong(currentIndex);
                }
            } else if (index < currentIndex) {
                currentIndex--;
            }
            renderPlaylist();
        }

        function setVolume(val) {
            audio.volume = val;
        }

        function setSpeed(val) {
            audio.playbackRate = val;
            document.getElementById('speedValue').textContent = val + 'x';
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById("repeatBtn").style.color = isRepeat ? "var(--primary)" : "white";
        }

        function toggleMixer() {
            mixer.classList.toggle("open");
        }

        // Progress Bar Update
        audio.addEventListener("timeupdate", () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${percent}%`;
            }
        });

        // Click to seek
        progressArea.addEventListener("click", (e) => {
            const width = progressArea.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        audio.addEventListener("ended", nextSong);
        
        // Initial setup
        audio.volume = 0.8;
    </script>
</body>
</html>
